<!doctype html>
<html lang="{{ locale }}">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>FastEdgy</title>
        <style>
            body {
                margin: 0;
                padding: 0;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    "Helvetica Neue", Arial, sans-serif;
                color: #141414 !important;
                line-height: 1.6;
            }

            .email-container {
                max-width: 600px;
                margin: 0 auto;
                padding: 0 24px;
            }

            .header {
                padding: 24px 0;
            }

            .header .logo {
                font-size: 28px;
                font-weight: bold;
                color: #ffffff;
                text-decoration: none;
                margin: 0;
            }

            .header .tagline {
                color: #dbeafe;
                font-size: 14px;
                margin: 8px 0 0 0;
            }

            .footer {
                padding-bottom: 32px;
            }

            .button {
                display: inline-block;
                background: #141414 !important;
                color: #fff !important;
                text-decoration: none;
                padding: 12px 24px;
                border-radius: 6px;
                font-weight: 500;
                margin: 16px auto;
            }

            .text-muted {
                color: #a1a1aa;
                font-size: 14px;
            }

            .divider {
                height: 1px;
                background-color: #ccc;
                margin: 24px 0;
                border: none;
            }

            h1 {
                color: #141414 !important;
                font-size: 24px;
                margin: 0 0 16px 0;
                font-weight: 600;
            }

            h2 {
                color: #141414 !important;
                font-size: 20px;
                margin: 24px 0 12px 0;
                font-weight: 600;
            }

            p {
                font-size: 14px;
                color: #141414 !important;
                margin: 12px 0 !important;
            }

            .highlight {
                background-color: #efefef;
                padding: 16px;
                border-radius: 6px;
                margin: 16px 0;
            }
        </style>
    </head>

    <body>
        <div class="email-container">
            <div class="header">
                <img
                    src="https://app.kascade.io/favicon.png"
                    alt="FastEdgy"
                    height="40"
                    style="display: block; margin: 0"
                />
            </div>
        </div>
    </body>
</html>
